services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: soccer-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - soccer-network

  mongodb:
    image: mongo:7
    container_name: soccer-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=soccer_scrapper
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - soccer-network

  redis:
    image: redis:7-alpine
    container_name: soccer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - soccer-network

  job-api:
    build:
      context: .
      dockerfile: Dockerfile.job-api
    container_name: soccer-job-api
    ports:
      - "8001:8001"
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672//
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=true
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - soccer-network

  persist-api:
    build:
      context: .
      dockerfile: Dockerfile.persist-api
    container_name: soccer-persist-api
    ports:
      - "8002:8002"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB=soccer_scrapper
      - DEBUG=true
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - soccer-network

  job-worker:
    build:
      context: .
      dockerfile: Dockerfile.job-worker
    container_name: soccer-job-worker
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672//
      - REDIS_URL=redis://redis:6379/0
      - BZZOIRO_API_URL=https://sports.bzzoiro.com/api
      - BZZOIRO_API_TOKEN=${BZZOIRO_API_TOKEN:-}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - soccer-network

  persist-worker:
    build:
      context: .
      dockerfile: Dockerfile.persist-worker
    container_name: soccer-persist-worker
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672//
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB=soccer_scrapper
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - soccer-network

  beat:
    build:
      context: .
      dockerfile: Dockerfile.beat
    container_name: soccer-beat
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672//
      - BZZOIRO_API_URL=https://sports.bzzoiro.com/api
      - BZZOIRO_API_TOKEN=${BZZOIRO_API_TOKEN:-}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - soccer-network

volumes:
  rabbitmq_data:
  mongodb_data:
  redis_data:

networks:
  soccer-network:
    driver: bridge
